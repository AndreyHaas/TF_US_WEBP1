<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startseite</title>
</head>
<body>
  <h1>Startseite</h1>
  <p>1. Verlinkung zu einer Adresse im gleichen Ordner</p>
  <a href="./seite2.html" target="_self">Seite 2</a>
  <!-- Das Attribut target=self ist Standard und öffnet den Link im gleichen Browsertab-->
   
  <p>2. Absolute Verlinkung zu einer Webadresse</p>
    <a href="https://wiki.selfhtml.org/wiki/HTML/Tutorials/Links/Referenzieren_in_HTML" target="_blank" rel="noopener">Infos bei Self HTML</a>
    <!-- Das Attribut target=blank öffnet den Link in einem neuen Tab -->

    <p>3. Bilder im a-tag</p> 
    <a href="./img/meerblick_1280px.jpg"><img src="./img/meerblick_150px.jpg" alt="Meerblick" title="zur großen Ansicht"></a>

    <p>4. Download einer PDF-Datei</p>
    <a href="./img/links_tag3.pdf" target="_blank" rel="noopener">Download Infos</a>
    <!-- mit dem Attribut download startet der download direkt -->

    <p>5. Verlinkung auf eine E-Mail-Adresse</p>
    <a href="mailto:info@adresse.de">E-Mail schreiben</a>
    <a href="tel:0201123456">Anrufen</a>
</body>
</html>
