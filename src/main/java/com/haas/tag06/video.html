<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video in HTML einbinden</title>
</head>
<body>
  <h1>Video einbinden mit dem Element video</h1>
  <video src="./video/fische_bunt.MP4" width="640px" height="auto" controls poster="./video/fische_bunt_640px.jpg"></video>

  <p>Mit den Attributen width und height kann die Größe des Videos bestimmt werden. Besser über CSS.</p>
  <p>controls = Steuerelemente für das Video</p>
  <p>poster = die URL eines Bildes, was bis zum Start gezeigt wird</p>
</body>
</html>
