<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einfache Tabelle</title>
    
    <style>
        table {
            border-collapse: collapse;
        }

        td { 
            border : 1px dotted #000;
            padding : 5px;
            background-color: antiquewhite;
        }

        caption {
            border : 1px dotted #000;
            padding: 5px;
            background-color: coral;
        }
    </style>
</head>

<body>
    <table>
        <caption>Einfache Tabelle in HTML</caption>
        <tr>
            <td>Spalte 1</td>
            <td>Spalte 2</td>
            <td>Spalte 3</td>
            <td>Spalte 4</td>
            <td>Spalte 5</td>
        </tr>
        <tr>
            <td>Zeile 2</td>
            <td>Spalte 2</td>
            <td>Spalte 3</td>
            <td>Spalte 4</td>
            <td>Spalte 5</td>
        </tr>
        <tr>
            <td>Zeile 3</td>
            <td>Spalte 2</td>
            <td>Spalte 3</td>
            <td>Spalte 4</td>
            <td>Spalte 5</td>
        </tr>
        <tr>
            <td>Zeile 4</td>
            <td>Spalte 2</td>
            <td>Spalte 3</td>
            <td>Spalte 4</td>
            <td>Spalte 5</td>
        </tr>
        <tr>
            <td>Zeile 5</td>
            <td>Spalte 2</td>
            <td>Spalte 3</td>
            <td>Spalte 4</td>
            <td>Spalte 5</td>
        </tr>
    </table>
</body>
</html>
