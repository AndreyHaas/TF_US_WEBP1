<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox</title>
  <style>
    section, div {
      border: 1px solid #000;
      padding: 10px;
      margin: 5px;
    }

    section {
      display: flex;
      flex-direction:row;
      justify-content:space-between;
    }
  </style>
</head>
<body>
  <h1>Flexbox 1</h1>
  <section>
    <div>Element 1</div>
    <div>Element 2</div>
    <div>Element 3</div>
  </section>
  <h2>Standard-Eigenschaften der Flexbox</h2>
  <p>flex-direction: row - von links nach rechts werden die Kinder sortiert <br>
  justify-content steuert die Elemente auf der Hauptachse. Der Standardwert ist flex-start.
  </p>
  
</body>
</html>
