<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Kontaktformular</title>

</head>
<body>
  <form action="#" method="post">
    <fieldset>
      <legend>Ihre Anfrage</legend>
      <div>
        <select name="betreff" id="betreff">
          <option disabled selected>Betreff auswählen</option>
          <option value="buchung">Ich möchte buchen</option>
          <option value="frage">Ich habe eine Frage zum Hotel</option>
          <option value="anreise">Mitteilung zur Anreise</option>
        </select>
       </div>

       <div>
        <label for="name">Name</label>
        <input type="text" name="name" placeholder="name" id="name" required />
      </div>

       <div>
        <label for="email">E-Mail-Adresse</label>
        <input type="email" name="email" id="email" required>
      </div>

      <div>
        <label for="tel">Telefon</label>
        <input type="tel" name="tel" id="tel">
      </div>

      <div>
        <label for="nachricht">Meine Nachricht</label>
        <textarea name="nachricht" id="nachricht" placeholder="hier bitte Nachricht schreiben" cols="40" rows="10"></textarea>
      </div>

      <!-- Daten für AN- und Abreise. Aktuelles Datum mit Javascript. Script am Ende des body einfügen --> 
              <div >
                <label for="datum">Datum Anreise </label>
                <input type="date" name="anreise" id="datum" min="2026-04-10" max="2026-12-31">
              </div>
              <div>
                <label for="abreise">Datum Abreise </label>
                <input type="date" name="abreise" id="abreise" min="2026-04-10" max="2026-12-31">
              </div>

      <div>
        <button type="submit" name="submit">Senden</button>
       </div>


    </fieldset>
  </form>
<!-- dynamisches Datum -->
  <script>
        document.getElementById('datum').value = new Date().toISOString().split('T')[0];
    </script>
  
</body>
</html>
